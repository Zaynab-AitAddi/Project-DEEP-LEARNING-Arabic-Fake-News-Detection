# Entraînement sur le jeu AFNDetection `data/raw/arabic_curated.csv` (MSA, fake vs real)
# Générer / régénérer le CSV : python scripts/materialize_arabic_curated.py
# Pour le corpus large Hugging Face, utilisez configs/train_arabic.yaml (local_path: null).

language: arabic

dataset:
  hub_id: "Nahla-yasmine/arabic_fake_news" # requis si local_path absent
  local_path: "data/raw/arabic_curated.csv"
  split: "train"
  text_mode: "title_plus_text"
  cache_dir: null

max_samples: null
val_ratio: 0.12
test_ratio: 0.12
seed: 42

model:
  pretrained: "aubmindlab/bert-base-arabertv2"
  max_length: 256

training:
  output_dir: "checkpoints/arabic"
  num_train_epochs: 5
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 16
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.08
  logging_steps: 10
  eval_strategy: "epoch"
  eval_steps: 500
  save_strategy: "epoch"
  save_steps: 500
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "f1"
  greater_is_better: true
  fp16: false

data_paths:
  processed_dir: "data/processed"
