<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 120" role="img">
  <title>Training and evaluation pipeline</title>
  <rect width="880" height="120" rx="12" fill="#0f172a"/>
  <text x="440" y="28" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">Training pipeline (YAML-driven)</text>
  <defs>
    <marker id="a" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0, 7 3.5, 0 7" fill="#64748b"/></marker>
  </defs>
  <g font-family="Segoe UI, sans-serif" font-size="11" fill="#e2e8f0">
    <rect x="24" y="48" width="120" height="52" rx="8" fill="#1e293b" stroke="#6366f1"/><text x="84" y="78" text-anchor="middle">Raw text</text><text x="84" y="92" text-anchor="middle" fill="#94a3b8" font-size="10">title + body</text>
    <line x1="146" y1="74" x2="188" y2="74" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
    <rect x="190" y="48" width="120" height="52" rx="8" fill="#1e293b" stroke="#22d3ee"/><text x="250" y="78" text-anchor="middle">Normalize</text><text x="250" y="92" text-anchor="middle" fill="#94a3b8" font-size="10">NFKC, strip marks</text>
    <line x1="312" y1="74" x2="354" y2="74" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
    <rect x="356" y="48" width="120" height="52" rx="8" fill="#1e293b" stroke="#a78bfa"/><text x="416" y="78" text-anchor="middle">Tokenize</text><text x="416" y="92" text-anchor="middle" fill="#94a3b8" font-size="10">AraBERT</text>
    <line x1="478" y1="74" x2="520" y2="74" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
    <rect x="522" y="48" width="120" height="52" rx="8" fill="#1e293b" stroke="#f472b6"/><text x="582" y="78" text-anchor="middle">Trainer</text><text x="582" y="92" text-anchor="middle" fill="#94a3b8" font-size="10">HF Trainer</text>
    <line x1="644" y1="74" x2="686" y2="74" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
    <rect x="688" y="48" width="168" height="52" rx="8" fill="#312e81" stroke="#c4b5fd"/><text x="772" y="74" text-anchor="middle">Save + eval</text><text x="772" y="90" text-anchor="middle" fill="#94a3b8" font-size="10">checkpoint | test_metrics.json</text>
  </g>
</svg>
